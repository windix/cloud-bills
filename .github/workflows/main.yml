name: Build and Push

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test

  build-and-push:
    name: Build and Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [test-backend, test-dashboard]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - file: Dockerfile
            name: node
            tag_prefix: ""
          - file: Dockerfile.bun
            name: bun
            tag_prefix: "bun-"
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${{ github.sha }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA:0:7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.file }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ matrix.tag_prefix }}latest
            ${{ steps.meta.outputs.image }}:${{ matrix.tag_prefix }}${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  build-binary:
    name: Build macOS Binary
    runs-on: macos-latest
    needs: [test-backend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile src/index.api.ts --outfile cloud-bills-server
      - name: Update tag
        run: |
          git tag -f server-latest
          git push -f origin server-latest
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-latest
          files: cloud-bills-server
          prerelease: true
